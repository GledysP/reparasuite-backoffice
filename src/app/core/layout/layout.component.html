<mat-sidenav-container
  class="rs-shell"
  [class.rs-mobile]="isMobile"
  [class.rs-collapsed]="!isMobile && isCollapsed"
  [hasBackdrop]="isMobile"
>
  <mat-sidenav
    #sidenav
    class="rs-sidebar"
    [class.is-mini]="!isMobile && isCollapsed"
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="isMobile ? mobileOpened : true"
    [disableClose]="!isMobile"
  >
    <div class="rs-side-header">
      <div class="rs-side-logo">
        <img src="assets/logo.png" alt="ReparaSuite" />
      </div>

      <div class="rs-side-brand">
        <div class="rs-side-title">ReparaSuite</div>
        <div class="rs-side-subtitle">BACKOFFICE</div>
      </div>
    </div>

    <mat-nav-list class="rs-nav">
      <a
        *ngFor="let item of navItems"
        mat-list-item
        class="rs-nav-item"
        [routerLink]="item.route"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
        [matTooltip]="item.label"
        [matTooltipDisabled]="!(!isMobile && isCollapsed)"
        matTooltipPosition="right"
        matTooltipClass="rs-nav-tooltip"
        (click)="closeMobileSidenav()"
      >
        <mat-icon matListItemIcon class="rs-nav-icon" fontSet="material-symbols-outlined">
          {{ item.icon }}
        </mat-icon>

        <span matListItemTitle class="rs-nav-text">{{ item.label }}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="rs-content">
    <mat-toolbar class="rs-header">
      <div class="rs-mobile-search-overlay" *ngIf="isMobile && mobileSearchOpen">
        <mat-form-field appearance="outline" class="rs-search rs-search-mobile" subscriptSizing="dynamic">
          <mat-icon matPrefix fontSet="material-symbols-outlined">search</mat-icon>
          <input matInput placeholder="Buscar..." />
          <button mat-icon-button matSuffix type="button" aria-label="Cerrar búsqueda" (click)="closeMobileSearch()">
            <mat-icon fontSet="material-symbols-outlined">close</mat-icon>
          </button>
        </mat-form-field>
      </div>

      <button
        mat-icon-button
        class="rs-icon-btn rs-menu-btn"
        type="button"
        (click)="toggleMenu()"
        aria-label="Abrir o cerrar menú"
      >
        <mat-icon fontSet="material-symbols-outlined">menu</mat-icon>
      </button>

      <mat-form-field
        *ngIf="!isMobile"
        appearance="outline"
        class="rs-search rs-search-desktop"
        subscriptSizing="dynamic"
      >
        <mat-icon matPrefix fontSet="material-symbols-outlined">search</mat-icon>
        <input matInput placeholder="Buscar..." />
      </mat-form-field>

      <button
        *ngIf="isMobile && !mobileSearchOpen"
        mat-icon-button
        class="rs-icon-btn"
        type="button"
        aria-label="Buscar"
        (click)="openMobileSearch()"
      >
        <mat-icon fontSet="material-symbols-outlined">search</mat-icon>
      </button>

      <button
        *ngIf="!isMobile"
        mat-button
        type="button"
        class="rs-cmdk-hint"
        (click)="openCommandPalette()"
        aria-label="Abrir buscador rápido"
      >
        <mat-icon fontSet="material-symbols-outlined">bolt</mat-icon>
        <span class="rs-cmdk-hint-text">Ctrl K</span>
      </button>

      <span class="rs-spacer"></span>

      <button
        mat-icon-button
        class="rs-icon-btn rs-notif-btn"
        type="button"
        aria-label="Notificaciones"
        [matMenuTriggerFor]="menuNotificaciones"
        (menuOpened)="refreshNotifications()"
      >
        <mat-icon
          class="rs-notif-icon"
          fontSet="material-symbols-outlined"
          [matBadge]="(unreadCount$ | async) ?? 0"
          [matBadgeHidden]="(((unreadCount$ | async) ?? 0) === 0)"
          matBadgeColor="warn"
          matBadgeSize="small"
        >
          notifications
        </mat-icon>
      </button>

      <mat-menu #menuNotificaciones="matMenu" class="rs-notif-menu" xPosition="before" yPosition="below">
        <div class="rs-notif-head" (click)="$event.stopPropagation()">
          <div class="rs-notif-title">Notificaciones</div>
          <button mat-button class="rs-notif-action" type="button" (click)="markAllRead()">
            Marcar todo como leído
          </button>
        </div>

        <mat-divider></mat-divider>

        <div class="rs-notif-list" (click)="$event.stopPropagation()">
          <ng-container *ngIf="(notifications$ | async) as list">
            <ng-container *ngIf="list.length > 0; else noNotif">
              <button
                mat-menu-item
                class="rs-notif-item"
                *ngFor="let n of list"
                (click)="openNotification(n)"
              >
                <mat-icon class="rs-notif-item-ic" fontSet="material-symbols-outlined">{{ n.icon }}</mat-icon>

                <div class="rs-notif-text">
                  <div class="rs-notif-row">
                    <div class="rs-notif-item-title">{{ n.title }}</div>
                    <span class="rs-notif-dot" *ngIf="n.unread"></span>
                  </div>
                  <div class="rs-notif-item-sub">{{ n.subtitle }}</div>
                  <div class="rs-notif-item-time">{{ n.timeLabel }}</div>
                </div>
              </button>
            </ng-container>

            <ng-template #noNotif>
              <div class="rs-notif-empty">No tienes notificaciones.</div>
            </ng-template>
          </ng-container>
        </div>
      </mat-menu>

      <button
        mat-button
        class="rs-profile-trigger"
        [matMenuTriggerFor]="menuUsuario"
        type="button"
        aria-label="Abrir menú de usuario"
      >
        <span class="rs-profile-chip">
          <span class="rs-avatar">A</span>

          <span class="rs-profile-text">
            <span class="rs-profile-name">Admin</span>
            <span class="rs-profile-role">Supervisor</span>
          </span>

          <mat-icon class="rs-chevron" fontSet="material-symbols-outlined">expand_more</mat-icon>
        </span>
      </button>
    </mat-toolbar>

    <mat-menu #menuUsuario="matMenu" class="rs-user-menu" xPosition="before" yPosition="below">
      <button mat-menu-item (click)="goToMyProfile()">
        <mat-icon fontSet="material-symbols-outlined">person</mat-icon>
        <span>Mi perfil</span>
      </button>

      <button mat-menu-item>
        <mat-icon fontSet="material-symbols-outlined">settings</mat-icon>
        <span>Preferencias</span>
      </button>

      <button mat-menu-item (click)="logout()">
        <mat-icon fontSet="material-symbols-outlined">logout</mat-icon>
        <span>Cerrar sesión</span>
      </button>
    </mat-menu>

    <main class="rs-main">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
