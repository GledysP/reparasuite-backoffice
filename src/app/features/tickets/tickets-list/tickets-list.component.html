<div class="rs-page-container">
  <header class="rs-header-row">
    <h1 class="rs-page-title">Tickets</h1>
  </header>

  @if (loading) {
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  }

  <mat-card class="white-card">
    <mat-card-content>
      <table mat-table [dataSource]="items" class="rs-table">

        <!-- Cliente -->
        <ng-container matColumnDef="cliente">
          <th mat-header-cell *matHeaderCellDef>Cliente</th>
          <td mat-cell *matCellDef="let t">
            <div class="cliente-col">
              <div class="cliente-nombre">{{ t.clienteNombre }}</div>
              <div class="cliente-email muted">{{ t.clienteEmail || '—' }}</div>
            </div>
          </td>
        </ng-container>

        <!-- Asunto -->
        <ng-container matColumnDef="asunto">
          <th mat-header-cell *matHeaderCellDef>Asunto</th>
          <td mat-cell *matCellDef="let t">{{ t.asunto }}</td>
        </ng-container>

        <!-- Estado -->
        <ng-container matColumnDef="estado">
          <th mat-header-cell *matHeaderCellDef>Estado</th>
          <td mat-cell *matCellDef="let t">
            <span class="status-pill">{{ t.estado }}</span>
          </td>
        </ng-container>

        <!-- Actualizado -->
        <ng-container matColumnDef="updatedAt">
          <th mat-header-cell *matHeaderCellDef>Actualizado</th>
          <td mat-cell *matCellDef="let t">{{ t.updatedAt | date:'yyyy-MM-dd HH:mm' }}</td>
        </ng-container>

        <!-- Acción -->
        <ng-container matColumnDef="accion">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let t">
            <a mat-stroked-button [routerLink]="['/tickets', t.id]">
              Ver
            </a>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        <tr class="empty-row" *ngIf="!loading && items.length === 0">
          <td [attr.colspan]="displayedColumns.length" class="muted" style="padding:16px;">
            No hay tickets.
          </td>
        </tr>
      </table>

      <mat-paginator
        [length]="total"
        [pageIndex]="page"
        [pageSize]="size"
        [pageSizeOptions]="[10, 20, 50]"
        (page)="paginar($event)">
      </mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
