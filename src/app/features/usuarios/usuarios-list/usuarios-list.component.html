<div class="rs-main-container rs-usuarios-page">
  <div class="rs-header-row">
    <div class="rs-header-copy">
      <h1 class="rs-page-title">Usuarios</h1>
      <p class="rs-page-subtitle">
        Gestión y administración de usuarios del sistema.
      </p>
    </div>

    <button mat-raised-button class="btn-create" (click)="crearUsuario()">
      <mat-icon>add</mat-icon>
      <span class="btn-text">Crear usuario</span>
    </button>
  </div>

  <mat-card class="rs-table-card">
    <mat-card-content class="no-padding">
      <div class="rs-table-responsive rs-desktop-table">
        <table mat-table [dataSource]="items" class="rs-table">

          <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef> Nombre </th>
            <td mat-cell *matCellDef="let row" class="fw-bold text-nowrap">
              {{ row.nombre }}
            </td>
          </ng-container>

          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef> Correo electrónico </th>
            <td mat-cell *matCellDef="let row" class="rs-text-secondary text-nowrap">
              {{ row.email }}
            </td>
          </ng-container>

          <ng-container matColumnDef="rol">
            <th mat-header-cell *matHeaderCellDef> Rol </th>
            <td mat-cell *matCellDef="let row">
              <span class="rs-badge" [ngClass]="row.rol.toLowerCase()">
                {{ row.rol }}
              </span>
            </td>
          </ng-container>

          <ng-container matColumnDef="activo">
            <th mat-header-cell *matHeaderCellDef class="cell-center"> Activo </th>
            <td mat-cell *matCellDef="let row" class="cell-center">
              <mat-slide-toggle
                [checked]="row.activo"
                color="primary"
                class="rs-compact-toggle"
                (change)="toggleEstado(row)"
                (click)="$event.stopPropagation()">
              </mat-slide-toggle>
            </td>
          </ng-container>

          <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef class="cell-actions"> Acciones </th>
            <td mat-cell *matCellDef="let row" class="cell-actions action-cell">
              <div class="rs-actions-container">
                <button mat-icon-button class="rs-btn-action" (click)="verUsuario(row)" title="Ver detalle">
                  <mat-icon>visibility</mat-icon>
                </button>

                <button mat-icon-button class="rs-btn-action" (click)="editarUsuario(row)" title="Editar">
                  <mat-icon>edit</mat-icon>
                </button>

                <button
                  mat-icon-button
                  class="rs-btn-action btn-delete"
                  *ngIf="!row.activo && row.rol.toLowerCase() !== 'admin'"
                  (click)="borrarUsuario(row)"
                  title="Eliminar permanentemente">
                  <mat-icon>delete_outline</mat-icon>
                </button>
              </div>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr
            mat-row
            *matRowDef="let row; columns: displayedColumns;"
            class="rs-table-row"
            [ngClass]="{'usuario-desactivado': !row.activo}">
          </tr>
        </table>
      </div>

      <div class="rs-mobile-cards">
        <div
          class="rs-user-card"
          *ngFor="let row of items"
          [ngClass]="{'usuario-desactivado': !row.activo}">

          <div class="rs-user-card-top">
            <div class="rs-user-main">
              <div class="rs-user-name">{{ row.nombre }}</div>
              <div class="rs-user-email">{{ row.email }}</div>
            </div>

            <span class="rs-badge" [ngClass]="row.rol.toLowerCase()">
              {{ row.rol }}
            </span>
          </div>

          <div class="rs-user-meta">
            <div class="rs-user-meta-item">
              <mat-icon>badge</mat-icon>
              <span>{{ row.rol }}</span>
            </div>

            <div class="rs-user-meta-item rs-toggle-item">
              <div class="rs-toggle-info">
                <mat-icon>radio_button_checked</mat-icon>
                <span>{{ row.activo ? 'Activo' : 'Inactivo' }}</span>
              </div>

              <mat-slide-toggle
                [checked]="row.activo"
                color="primary"
                class="rs-compact-toggle rs-mobile-toggle"
                (change)="toggleEstado(row)"
                (click)="$event.stopPropagation()">
              </mat-slide-toggle>
            </div>
          </div>

          <div class="rs-user-card-actions">
            <div class="rs-user-card-actions-left">
              <button mat-button class="rs-card-view-btn" (click)="verUsuario(row)">
                <mat-icon>visibility</mat-icon>
                Ver detalle
              </button>
            </div>

            <div class="rs-user-card-actions-right">
              <button mat-icon-button class="rs-btn-action" (click)="editarUsuario(row)" title="Editar">
                <mat-icon>edit</mat-icon>
              </button>

              <button
                mat-icon-button
                class="rs-btn-action btn-delete"
                *ngIf="!row.activo && row.rol.toLowerCase() !== 'admin'"
                (click)="borrarUsuario(row)"
                title="Eliminar permanentemente">
                <mat-icon>delete_outline</mat-icon>
              </button>
            </div>
          </div>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
