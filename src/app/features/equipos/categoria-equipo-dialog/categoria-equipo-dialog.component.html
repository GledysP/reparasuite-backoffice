<h2 mat-dialog-title>{{ data.categoria ? 'Editar categoría' : 'Nueva categoría' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="rs-dialog-form">
    <mat-form-field appearance="outline">
      <mat-label>Código *</mat-label>
      <input matInput formControlName="codigo" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Nombre *</mat-label>
      <input matInput formControlName="nombre" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="span-2">
      <mat-label>Descripción</mat-label>
      <textarea matInput rows="3" formControlName="descripcion"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Icono</mat-label>
      <input matInput formControlName="icono" placeholder="tv / laptop_mac / router" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Orden visual</mat-label>
      <input matInput type="number" formControlName="ordenVisual" />
    </mat-form-field>

    <div class="span-2">
      <mat-checkbox formControlName="activa">Categoría activa</mat-checkbox>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="cerrar()">Cancelar</button>
  <button mat-flat-button class="rs-primary-btn" type="button" (click)="guardar()" [disabled]="saving">
    {{ saving ? 'Guardando...' : 'Guardar' }}
  </button>
</mat-dialog-actions>
